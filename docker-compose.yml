services:
  postgres:
    image: postgres:17-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventory_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventory_management}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/InventoryManagement.Api/Dockerfile
    container_name: inventory-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-inventory_management};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_SUPER_SECRET_DEVELOPMENT_KEY_32_CHARS}
      JWT_ISSUER: ${JWT_ISSUER:-InventoryManagement}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-InventoryManagementClient}
      Frontend__Url: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/inventory-management-client/Dockerfile
      args:
        VITE_API_URL: http://localhost:${API_PORT:-5000}/api
    container_name: inventory-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres-data:
