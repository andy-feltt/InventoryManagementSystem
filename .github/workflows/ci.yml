name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore backend/InventoryManagement.sln

      - name: Build backend
        run: dotnet build backend/InventoryManagement.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/InventoryManagement.sln --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/inventory-management-client/package-lock.json

      - name: Install frontend
        working-directory: frontend/inventory-management-client
        run: npm ci

      - name: Build frontend
        working-directory: frontend/inventory-management-client
        run: npm run build
